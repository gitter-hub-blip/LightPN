name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # go.mod is the single source of truth for the minimum Go version
          # (README must claim the same).
          go-version-file: go.mod
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
      - run: go test -race ./...
